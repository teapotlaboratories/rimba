# Secured (SAE) S1G mesh — wpa_supplicant_s1g, the Phase-0 gold-standard reference.
# Delta from the open-mesh config (docs/worklog/2026-06-26-linux-mesh-reference.md):
#   key_mgmt=NONE -> key_mgmt=SAE ; add sae_password. user_mpm=1 is required for secured.
ctrl_interface=/var/run/wpa_supplicant_s1g
country=US
user_mpm=1
network={
    ssid="rimba-smesh"
    mode=5                       # WPAS_MODE_MESH
    key_mgmt=SAE                 # secured (was NONE for open)
    sae_password="rimbamesh2026"
    country="US"                 # MUST be quoted
    op_class=68                  # S1G global op-class, ch27 / 1 MHz
    channel=27
    s1g_prim_chwidth=0
    s1g_prim_1mhz_chan_index=0
    dtim_period=1                # REQUIRED (mesh join bails otherwise)
    beacon_int=100
}
