<svg width="100%" viewBox="0 0 680 500" role="img" xmlns="http://www.w3.org/2000/svg">
<title>Rimba routing mode transitions</title>
<desc>State machine showing OGM proactive, RREQ reactive, geographic overlay, and DTN base layer</desc>
<defs>
<marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
<path d="M2 1L8 5L2 9" fill="none" stroke="#888780" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
</marker>
<marker id="arr2" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
<path d="M2 1L8 5L2 9" fill="none" stroke="#3d3d3a" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
</marker>
</defs>

<!-- DTN base layer -->
<rect x="40" y="408" width="600" height="58" rx="8" fill="#D3D1C7" stroke="#B4B2A9" stroke-width="0.5"/>
<text font-family="sans-serif" font-size="14" font-weight="500" x="340" y="430" text-anchor="middle" fill="#2C2C2A">DTN — store and forward</text>
<text font-family="sans-serif" font-size="12" x="340" y="450" text-anchor="middle" fill="#5F5E5A">always active — bundle waits when no route found, drains when path appears</text>

<!-- Geographic overlay -->
<rect x="40" y="50" width="600" height="52" rx="8" fill="#9FE1CB" stroke="#1D9E75" stroke-width="0.5"/>
<text font-family="sans-serif" font-size="14" font-weight="500" x="340" y="68" text-anchor="middle" fill="#04342C">Mode 3 — geographic greedy (optional overlay, GPS)</text>
<text font-family="sans-serif" font-size="12" x="340" y="87" text-anchor="middle" fill="#085041">per-bundle decision over Mode 1 and 2 — activates when destination GPS position is known</text>

<!-- fallback arrows from geographic to modes -->
<path d="M 160 102 L 160 162" fill="none" stroke="#B4B2A9" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#arr)"/>
<text font-family="sans-serif" font-size="11" x="166" y="130" fill="#888780">void / pos</text>
<text font-family="sans-serif" font-size="11" x="166" y="143" fill="#888780">unknown</text>
<path d="M 520 102 L 520 162" fill="none" stroke="#B4B2A9" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#arr)"/>
<text font-family="sans-serif" font-size="11" x="526" y="130" fill="#888780">void / pos</text>
<text font-family="sans-serif" font-size="11" x="526" y="143" fill="#888780">unknown</text>

<!-- OGM mode box -->
<rect x="50" y="164" width="240" height="104" rx="8" fill="#CECBF6" stroke="#534AB7" stroke-width="0.5"/>
<text font-family="sans-serif" font-size="14" font-weight="500" x="170" y="190" text-anchor="middle" fill="#26215C">Mode 1 — OGM proactive</text>
<text font-family="sans-serif" font-size="12" x="170" y="210" text-anchor="middle" fill="#3C3489">Floods I-exist messages</text>
<text font-family="sans-serif" font-size="12" x="170" y="228" text-anchor="middle" fill="#3C3489">Full table always built</text>
<text font-family="sans-serif" font-size="12" x="170" y="246" text-anchor="middle" fill="#3C3489">Zero discovery latency</text>

<!-- RREQ mode box -->
<rect x="390" y="164" width="240" height="104" rx="8" fill="#B5D4F4" stroke="#185FA5" stroke-width="0.5"/>
<text font-family="sans-serif" font-size="14" font-weight="500" x="510" y="190" text-anchor="middle" fill="#042C53">Mode 2 — RREQ / RREP</text>
<text font-family="sans-serif" font-size="12" x="510" y="210" text-anchor="middle" fill="#0C447C">On-demand route discovery</text>
<text font-family="sans-serif" font-size="12" x="510" y="228" text-anchor="middle" fill="#0C447C">Gossip flood control</text>
<text font-family="sans-serif" font-size="12" x="510" y="246" text-anchor="middle" fill="#0C447C">~500ms–2s first route</text>

<!-- Transition OGM → RREQ -->
<path d="M 290 192 L 388 192" fill="none" stroke="#3d3d3a" stroke-width="1.5" marker-end="url(#arr2)"/>
<rect x="296" y="172" width="90" height="26" rx="4" fill="white" stroke="none"/>
<text font-family="sans-serif" font-size="11" x="341" y="189" text-anchor="middle" fill="#5F5E5A">originators &gt; 30</text>

<!-- Transition RREQ → OGM -->
<path d="M 390 235 L 292 235" fill="none" stroke="#3d3d3a" stroke-width="1.5" marker-end="url(#arr2)"/>
<rect x="296" y="239" width="90" height="32" rx="4" fill="white" stroke="none"/>
<text font-family="sans-serif" font-size="11" x="341" y="252" text-anchor="middle" fill="#5F5E5A">originators &lt; 10</text>
<text font-family="sans-serif" font-size="11" x="341" y="265" text-anchor="middle" fill="#5F5E5A">for 120 s</text>

<!-- First boot label -->
<text font-family="sans-serif" font-size="11" x="170" y="154" text-anchor="middle" fill="#888780">▼ first boot</text>

<!-- DTN fallback arrows -->
<path d="M 170 268 L 170 406" fill="none" stroke="#B4B2A9" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#arr)"/>
<text font-family="sans-serif" font-size="11" x="80" y="344" fill="#888780">no route</text>
<text font-family="sans-serif" font-size="11" x="80" y="357" fill="#888780">found</text>

<path d="M 510 268 L 510 406" fill="none" stroke="#B4B2A9" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#arr)"/>
<text font-family="sans-serif" font-size="11" x="524" y="344" fill="#888780">no route</text>
<text font-family="sans-serif" font-size="11" x="524" y="357" fill="#888780">found</text>

<!-- Gateway anycast note -->
<rect x="220" y="296" width="240" height="62" rx="6" fill="#F1EFE8" stroke="#D3D1C7" stroke-width="0.5"/>
<text font-family="sans-serif" font-size="12" font-weight="500" x="340" y="320" text-anchor="middle" fill="#5F5E5A">Gateway anycast</text>
<text font-family="sans-serif" font-size="11" x="340" y="338" text-anchor="middle" fill="#888780">RREQ to GATEWAY_ANYCAST_ID</text>
<text font-family="sans-serif" font-size="11" x="340" y="352" text-anchor="middle" fill="#888780">works in Mode 1 or Mode 2</text>

<!-- Footer -->
<text font-family="sans-serif" font-size="11" x="340" y="492" text-anchor="middle" fill="#888780">Solid = mode transitions · Dashed = fallback paths · Geographic is per-bundle, not a global state</text>
</svg>
